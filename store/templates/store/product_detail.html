{% extends 'store/base.html' %}

{% block title %} {{category.name}} {% endblock %}

{% block content %}
<h1>{{name}}</h1>

<div class="d-md-flex flex-md-equal w-100 my-md-3 ps-md-3">
    <div class="text-bg-dark me-md-3 pt-3 px-3 pt-md-5 px-md-5 text-center overflow-hidden flex-grow-1">
        <div class="my-3 py-3"><h2 class="display-5">{{ product.name }}</h2>
            <p class="lead">{{ product.description }}</p></div>
        <p class="lead">{{ product.price }} $</p></div>

</div>
{% endblock %}
